<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Nireeksha!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffeef0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Update OS Interface Window */
        .window-container {
            background: #fff5f6;
            border: 2px solid #ffccd3;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .window-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #7d686a;
            font-weight: 600;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .terminal-box {
            background: #2a313d;
            color: #5bf1b7;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 13px;
            line-height: 1.5;
            min-height: 80px;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .window-title {
            font-size: 22px;
            color: #2b3542;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .window-subtitle {
            font-size: 16px;
            color: #4f5e74;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .btn-upgrade {
            background: #00e676;
            color: white;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }

        .btn-stay {
            background: #ff3366;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
            position: absolute;
            width: calc(100% - 40px);
            left: 20px;
        }

        /* Final Card Interface */
        .card-container {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            padding: 30px 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            text-align: center;
            display: none;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .img-frame {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 5px;
            background: linear-gradient(45deg, #ff3366, #ff99cc);
            box-shadow: 0 8px 20px rgba(255, 51, 102, 0.2);
        }

        .img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
        }

        .main-title {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 32px;
            color: #ff3366;
            margin-bottom: 5px;
        }

        .name-banner {
            font-size: 26px;
            color: #2b3542;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            background: #ffe5ec;
            color: #ff3366;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* Lyrics / Subtitle styling */
        .lyrics-box {
            font-size: 18px;
            font-weight: 600;
            color: #4f5e74;
            min-height: 28px;
            margin-bottom: 25px;
            font-style: italic;
            transition: color 0.3s;
        }

        .lyrics-highlight {
            color: #ff3366;
        }

        .footer-status {
            font-size: 12px;
            color: #a0abbb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Confetti Elements */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff3366;
            border-radius: 50%;
            top: -10px;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" preload="auto">
        <source src="https://ia600204.us.archive.org/33/items/be-my-baby-320258-mobiles24/Be_My_Baby-320258-mobiles24.mp3" type="audio/mpeg">
    </audio>

    <div class="window-container" id="setup-window">
        <div class="window-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span>Nireeksha_OS - System Update</span>
        </div>
        <div class="terminal-box" id="terminal-text">
            > Initializing Nireeksha_OS kernel... Verifying age parameters... Update Recommended.
        </div>
        <h2 class="window-title">System v22.0 is expiring soon.</h2>
        <p class="window-subtitle">Upgrade to v23.0 now?</p>
        
        <button class="btn btn-upgrade" onclick="triggerUpgrade()">YES, UPGRADE</button>
        <button class="btn btn-stay" id="stay-btn" onmouseover="evadeButton()" onclick="evadeButton()">STAY 22</button>
        <div style="height: 50px;"></div> </div>

    <div class="card-container" id="celebration-card">
        <div class="img-frame">
            <img src="nireeksha.jpg" alt="Nireeksha">
        </div>
        <h1 class="main-title">Happy 23rd Birthday</h1>
        <div class="name-banner">Nireeksha</div>
        <span class="badge">Level 23 Unlocked!</span>
        
        <div class="lyrics-box" id="lyrics-display">🎵 Music initializing...</div>
        
        <div class="footer-status">System Status: Optimization Complete ❤️</div>
    </div>

    <script>
        const stayBtn = document.getElementById('stay-btn');
        const terminal = document.getElementById('terminal-text');
        const audio = document.getElementById('bg-music');
        
        let prankStage = 0;
        const messages = [
            "> ERROR 403: Age progression is mandatory.",
            "> WARNING: Denial levels critical. Increasing cake requests.",
            "> LOG: Attempting to pause time... Access Denied.",
            "> System: Are you sure? Quarter-life crisis protocols will increase.",
            "> System: Confirming... Did you sign the waiver for adulting?"
        ];

        // Moving button logic
        function evadeButton() {
            // Update terminal text with a new funny error comment
            terminal.innerText = messages[prankStage];
            prankStage = (prankStage + 1) % messages.length;

            // Generate temporary coordinates inside the layout window boundaries
            const container = document.getElementById('setup-window');
            const maxWidth = container.clientWidth - stayBtn.clientWidth - 20;
            const maxHeight = 300; // boundary scope height limit
            
            const randomX = Math.floor(Math.random() * maxWidth) + 10;
            const randomY = Math.floor(Math.random() * maxHeight) - 150; // shift height ranges offset

            stayBtn.style.left = randomX + 'px';
            stayBtn.style.top = randomY + 'px';
        }

        // Upgrade activation
        function triggerUpgrade() {
            document.getElementById('setup-window').style.display = 'none';
            const card = document.getElementById('celebration-card');
            card.style.display = 'block';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
            }, 50);

            // Play background music
            audio.play().catch(error => {
                console.log("Audio autoplay prevented. Interaction handle updated.");
            });
            
            // Build celebration particles loop
            setInterval(createConfetti, 150);
            
            // Start Lyric Engine
            startLyricEngine();
        }

        // Live Lyric Sync Tracking System
        const lyricsTimeline = [
            { time: 0.0, text: "The night we met I knew I needed you so..." },
            { time: 4.2, text: "And if I had the chance I'd never let you go..." },
            { time: 8.5, text: "So won't you say you love me..." },
            { time: 12.0, text: "I'll make you so proud of me..." },
            { time: 15.2, text: "We'll make 'em turn their heads every place we go..." },
            { time: 20.0, text: "So won't you please..." },
            { time: 22.1, text: "Be my, be my baby! 🎵", highlight: true },
            { time: 25.4, text: "Be my little baby! 💖", highlight: true },
            { time: 27.8, text: "Say you'll be my darling! 💕", highlight: true },
            { time: 30.0, text: "Be my baby now! 🎉", highlight: true }
        ];

        function startLyricEngine() {
            const display = document.getElementById('lyrics-display');
            
            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;
                let activeLine = lyricsTimeline[0].text;
                let shouldHighlight = false;

                for (let i = 0; i < lyricsTimeline.length; i++) {
                    if (currentTime >= lyricsTimeline[i].time) {
                        activeLine = lyricsTimeline[i].text;
                        shouldHighlight = lyricsTimeline[i].highlight || false;
                    }
                }

                display.innerText = activeLine;
                if (shouldHighlight) {
                    display.classList.add('lyrics-highlight');
                } else {
                    display.classList.remove('lyrics-highlight');
                }
            });
        }

        // Confetti Generator
        const colors = ['#ff3366', '#ff99cc', '#ffbd2e', '#00e676', '#29b6f6'];
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 6 + 6 + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
            
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    </script>
</body>
                </html>
